<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>

<title>Jonas' Geburtstagsschatzsuche</title>
<style>
  :root{ --bg:#1f2733; --panel:#2a3340; --ink:#e9eef5; --muted:#9fb0c3; --line:#3a4757; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .wrap{ max-width:720px; margin:0 auto; padding:14px; }
  h1{ font-size:18px; margin:4px 2px 2px; font-weight:650; }
  .sub{ font-size:13px; color:var(--muted); margin:0 2px 10px; }
  .stage{ background:#82b84f; border:1px solid var(--line); border-radius:12px; overflow:hidden; box-shadow:0 6px 24px rgba(0,0,0,.35); }
  canvas{ display:block; width:100%; height:auto; image-rendering:pixelated; outline:none; touch-action:none; }
  .controls{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:12px; flex-wrap:wrap; }
  .legend{ font-size:12px; color:var(--muted); line-height:1.7; }
  .legend b{ color:var(--ink); font-weight:600; }
  .pad{ display:grid; grid-template-columns:repeat(3,46px); grid-template-rows:repeat(2,46px); gap:6px; }
  .pad button{ background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:10px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .pad button:active{ background:#36465a; }
  .pad .sp{ visibility:hidden; }
  .hint{ font-size:12px; color:var(--muted); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Jonas' Geburtstagsschatzsuche</h1>
  <p class="sub">Bewege dich mit den <b>Pfeiltasten</b> (oder den Tasten unten). Geh nah an eine Person und drücke die <b>Leertaste</b> bzw. „Reden", um zu sprechen.</p>
  <div class="stage"><canvas id="cv" width="680" height="500" tabindex="0"></canvas></div>
  <div style="margin-top:10px;display:flex;gap:8px;"><button id="act" style="background:#6e4a28;color:#f4ead6;border:1px solid #6e4a28;border-radius:8px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;">Reden / Weiter</button></div>
  <div class="controls">
    <div class="pad">
      <span class="sp"></span><button id="up" aria-label="hoch">▲</button><span class="sp"></span>
      <button id="left" aria-label="links">◀</button><button id="down" aria-label="runter">▼</button><button id="right" aria-label="rechts">▶</button>
    </div>
  </div>
  <p class="hint">Tipp: einmal ins Spielfeld tippen/klicken, dann gehen auch die Pfeiltasten der Tastatur.</p>
</div>

<div id="codeOverlay" style="display:none; position:fixed; inset:0; background:rgba(10,14,20,0.6); z-index:50; align-items:center; justify-content:center;">
  <div style="background:#f4ead6; border:3px solid #6e4a28; border-radius:14px; padding:18px; width:300px; max-width:88vw; box-shadow:0 12px 44px rgba(0,0,0,.55);">
    <div style="font-weight:700; color:#5a3c1e; font-size:15px; margin-bottom:10px;">Codewort eingeben</div>
    <input id="codeInput" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Codewort …" style="width:100%; box-sizing:border-box; padding:10px; font-size:15px; border:1px solid #6e4a28; border-radius:8px; background:#fffdf6; color:#2a2a2a;"/>
    <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-end;">
      <button id="codeCancel" style="background:#e3d6bf; color:#5a3c1e; border:1px solid #b59a6e; border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer;">Abbrechen</button>
      <button id="codeOk" style="background:#6e4a28; color:#f4ead6; border:1px solid #6e4a28; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer;">Truhe öffnen</button>
    </div>
  </div>
</div>

  function nearBuilding(x,y){

  block(tarp.x,tarp.y,tarp.x,tarp.y); // Tarp blockieren -> Jonas steht daneben

  (function(){ var pg=null; graves.forEach(function(g){ if(g.puzzle) pg=g; });
